name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux (Ubuntu, GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libosmium2-dev \
            libprotozero-dev \
            libboost-dev \
            libbz2-dev \
            libexpat1-dev \
            zlib1g-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Convert the bundled example
        run: |
          ./build/osm2xodr examples/tiny_intersection.osm build/tiny_intersection.xodr \
            --report build/tiny_intersection_report.txt

      - name: Run verification scripts
        run: |
          python3 test/check_junction_continuity.py build/tiny_intersection.xodr
          python3 test/check_road_link_continuity.py build/tiny_intersection.xodr
          python3 test/check_turn_lane_routing.py examples/tiny_intersection.osm build/tiny_intersection.xodr

  build-macos:
    name: macOS (Clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # No system package for libosmium/protozero on macOS; the macos-release
      # CMake preset points at the vendored copies under external/ instead
      # (see README > Manual/vendor libosmium setup).
      - name: Configure
        run: cmake --preset macos-release

      - name: Build
        run: cmake --build --preset macos-release -j

      - name: Convert the bundled example
        run: |
          ./build/macos-release/osm2xodr examples/tiny_intersection.osm build/macos-release/tiny_intersection.xodr \
            --report build/macos-release/tiny_intersection_report.txt

      - name: Run verification scripts
        run: |
          python3 test/check_junction_continuity.py build/macos-release/tiny_intersection.xodr
          python3 test/check_road_link_continuity.py build/macos-release/tiny_intersection.xodr
          python3 test/check_turn_lane_routing.py examples/tiny_intersection.osm build/macos-release/tiny_intersection.xodr

  build-windows:
    name: Windows (MSVC, vcpkg)
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-x64-${{ hashFiles('vcpkg.json') }}

      - name: Configure
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build --preset windows-x64-release

      - name: Convert the bundled example
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build\windows-x64 -Filter osm2xodr.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          & $exe examples\tiny_intersection.osm build\windows-x64\tiny_intersection.xodr `
            --report build\windows-x64\tiny_intersection_report.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          echo "XODR_PATH=build\windows-x64\tiny_intersection.xodr" >> $env:GITHUB_ENV

      - name: Run verification scripts
        shell: pwsh
        run: |
          python test/check_junction_continuity.py $env:XODR_PATH
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python test/check_road_link_continuity.py $env:XODR_PATH
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python test/check_turn_lane_routing.py examples/tiny_intersection.osm $env:XODR_PATH
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
